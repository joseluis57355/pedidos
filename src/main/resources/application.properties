# Configuracion de la aplicacion
spring.application.name=pedidos
server.port=${SERVER_PORT:8080}

# Configuracion de la base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# Actuator - Health Checks and Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Micrometer Metrics
management.metrics.enable.jvm=true

# Redis Cache Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}
spring.data.redis.timeout=60000
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Cache Configuration
spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.cache.redis.time-to-live=3600000

# Application Info
info.app.name=Pedidos API
info.app.description=Order Management REST API
info.app.version=0.0.1-SNAPSHOT
info.debug.config-version=actuator-test-001

logging.level.org.springframework.boot.actuate=DEBUG
logging.level.org.springframework.boot.actuate.endpoint.web=DEBUG
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.springframework.cache=TRACE
logging.level.org.springframework.data.redis=DEBUG
